name: Release MSI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-msi:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake --version
          cmake -S . -B build

      - name: Build application
        shell: pwsh
        run: cmake --build build --config Release --target ttplayer_classic

      - name: Install WiX
        shell: pwsh
        run: dotnet tool install --global wix --version 6.0.2

      - name: Build MSI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          wix build installer\TTPlayerClassic.wxs `
            -arch x64 `
            -d BuildOutput=build\Release `
            -d ResourceDir=resources `
            -d SkinDir=skins `
            -o dist\TTPlayerClassic.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: TTPlayerClassic-msi
          path: dist/TTPlayerClassic.msi
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $msi = "dist\TTPlayerClassic.msi"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $msi --clobber
          } else {
            gh release create $tag $msi --title "TTPlayer Classic $tag" --generate-notes
          }
